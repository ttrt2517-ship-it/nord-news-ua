name: Publish Article

on:
  workflow_dispatch:
  schedule:
    # 11:00, 14:00, 17:00, 20:00, 23:00 UTC+2 = 09:00, 12:00, 15:00, 18:00, 21:00 UTC
    - cron: '0 9 * * *'     # 11:00 Київ (наступна публікація!)
    - cron: '0 12 * * *'    # 14:00 Київ
    - cron: '0 15 * * *'    # 17:00 Київ
    - cron: '0 18 * * *'    # 20:00 Київ
    - cron: '0 21 * * *'    # 23:00 Київ

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        fetch-depth: 0

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run publisher
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: node publisher.js

    - name: Commit and push changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add database/queue.json data/articles.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Published article" && git push)
      continue-on-error: true
