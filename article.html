<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завантаження...</title>
    <meta name="description" content="Стаття на Норд — Новини Норвегії українською">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="index.html" class="logo">
                <span class="logo-icon">🇳🇴</span>
                <span class="logo-text">Норд</span>
            </a>
            <nav class="nav">
                <a href="index.html" class="nav-link">Новини</a>
                <a href="index.html#about" class="nav-link">Про нас</a>
                <a href="https://t.me/+YfELMEQsAD4zNmM0" class="nav-link" target="_blank">Telegram</a>
            </nav>
            <div class="header-actions">
                <button class="theme-toggle" aria-label="Перемкнути тему">
                    <span class="theme-icon sun">☀️</span>
                    <span class="theme-icon moon">🌙</span>
                </button>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="container" style="max-width: 800px;">
            <div id="article-content">
                <div class="loading">Завантаження статті...</div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div style="text-align: center; padding: 2rem 0;">
                <p style="color: #64748b;">© 2026 Норд. Новини Норвегії українською.</p>
            </div>
        </div>
    </footer>

    <script>
        // Theme manager - запускаем сразу
        (function() {
            const saved = localStorage.getItem('nord-theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
        })();

        // Article loader
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('slug');

        if (!slug) {
            document.getElementById('article-content').innerHTML = '<p>Статтю не знайдено. <a href="index.html">← Повернутись</a></p>';
        } else {
            fetch('data/articles.json')
                .then(r => r.json())
                .then(articles => {
                    const article = articles.find(a => a.slug === slug);
                    if (!article) {
                        document.getElementById('article-content').innerHTML = `
                            <p>Статтю не знайдено.</p>
                            <p><a href="index.html" class="btn btn-primary">← Всі новини</a></p>
                        `;
                        return;
                    }

                    document.title = article.title + ' — Норд';
                    
                    // Форматуємо контент - розбиваємо на параграфи
                    const paragraphs = article.content
                        .split(/\n\n+/)
                        .filter(p => p.trim())
                        .map(p => `<p style="margin-bottom: 1.5rem;">${p.trim()}</p>`);
                    
                    // Визначаємо точки вставки картинок (1/3 і 2/3 тексту)
                    const totalParagraphs = paragraphs.length;
                    const firstImagePos = Math.floor(totalParagraphs / 3);
                    const secondImagePos = Math.floor(totalParagraphs * 2 / 3);
                    
                    // Розбиваємо на частини
                    const part1 = paragraphs.slice(0, firstImagePos).join('\n');
                    const part2 = paragraphs.slice(firstImagePos, secondImagePos).join('\n');
                    const part3 = paragraphs.slice(secondImagePos).join('\n');
                    
                    // Визначаємо час читання
                    const readingTime = Math.max(1, Math.ceil(article.content.split(/\s+/).length / 200));
                    
                    // Отримуємо додаткові картинки (якщо є)
                    const images = article.images || [article.image];
                    
                    document.getElementById('article-content').innerHTML = `
                        <article class="article-full" style="max-width: 720px; margin: 0 auto;">
                            <!-- Breadcrumbs -->
                            <nav style="margin-bottom: 1.5rem;">
                                <a href="index.html" style="color: var(--text-secondary); text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.875rem;">
                                    ← Всі новини
                                </a>
                            </nav>
                            
                            <!-- Header -->
                            <header style="margin-bottom: 2rem;">
                                <h1 style="
                                    font-size: clamp(1.75rem, 5vw, 2.5rem);
                                    margin-bottom: 1.5rem;
                                    line-height: 1.2;
                                    font-weight: 700;
                                    color: var(--text-primary);
                                ">
                                    ${article.title}
                                </h1>
                                
                                <div style="
                                    display: flex;
                                    flex-wrap: wrap;
                                    gap: 1rem;
                                    align-items: center;
                                    color: var(--text-secondary);
                                    font-size: 0.875rem;
                                ">
                                    <span>📰 ${article.source_name || 'Норд'}</span>
                                    <span>📅 ${new Date(article.published_at).toLocaleDateString('uk-UA', { day: 'numeric', month: 'long', year: 'numeric' })}</span>
                                    <span>⏱️ ${readingTime} хв читання</span>
                                </div>
                            </header>
                            
                            <!-- Hero Image -->
                            <figure style="margin: 0 0 2.5rem 0;">
                                <img src="${images[0]}" alt="${article.title}" style="
                                    width: 100%;
                                    border-radius: 1rem;
                                    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
                                ">
                            </figure>
                            
                            <!-- Part 1 -->
                            <div style="
                                font-size: 1.125rem;
                                line-height: 1.8;
                                color: var(--text-primary);
                            ">
                                ${part1}
                            </div>
                            
                            ${images[1] ? `
                            <!-- Middle Image -->
                            <figure style="margin: 2.5rem 0;">
                                <img src="${images[1]}" alt="" style="
                                    width: 100%;
                                    border-radius: 1rem;
                                    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
                                ">
                            </figure>
                            ` : ''}
                            
                            <!-- Part 2 -->
                            <div style="
                                font-size: 1.125rem;
                                line-height: 1.8;
                                color: var(--text-primary);
                            ">
                                ${part2}
                            </div>
                            
                            ${images[2] ? `
                            <!-- Closing Image -->
                            <figure style="margin: 2.5rem 0;">
                                <img src="${images[2]}" alt="" style="
                                    width: 100%;
                                    border-radius: 1rem;
                                    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
                                ">
                            </figure>
                            ` : ''}
                            
                            <!-- Part 3 -->
                            <div style="
                                font-size: 1.125rem;
                                line-height: 1.8;
                                color: var(--text-primary);
                            ">
                                ${part3}
                            </div>
                            
                            <!-- Footer -->
                            <footer style="
                                margin-top: 3rem;
                                padding-top: 2rem;
                                border-top: 2px solid var(--border-color);
                            ">
                                <div style="margin-bottom: 2rem;">
                                    <a href="${article.original_url}" target="_blank" rel="noopener" style="
                                        display: inline-flex;
                                        align-items: center;
                                        gap: 0.5rem;
                                        color: var(--accent);
                                        text-decoration: none;
                                        font-size: 0.875rem;
                                        padding: 0.75rem 1.25rem;
                                        background: var(--bg-secondary);
                                        border-radius: 0.5rem;
                                        transition: all 0.2s;
                                    ">
                                        📎 Джерело: ${article.source_name || 'оригінал'}
                                        <span>↗</span>
                                    </a>
                                </div>
                                
                                <div style="
                                    padding: 2rem;
                                    background: var(--bg-secondary);
                                    border-radius: 1rem;
                                    text-align: center;
                                    border: 1px solid var(--border-color);
                                ">
                                    <h3 style="margin: 0 0 0.5rem 0; font-size: 1.25rem; color: var(--text-primary);">
                                        📱 Більше новин в Telegram
                                    </h3>
                                    <p style="margin: 0 0 1.25rem 0; color: var(--text-secondary); font-size: 0.9rem;">
                                        Приєднуйтесь до спільноти українців у Норвегії
                                    </p>
                                    <a href="https://t.me/+YfELMEQsAD4zNmM0" target="_blank" style="
                                        display: inline-block;
                                        padding: 0.875rem 2rem;
                                        background: #0088cc;
                                        color: white;
                                        text-decoration: none;
                                        border-radius: 0.5rem;
                                        font-weight: 600;
                                    ">
                                        Приєднатись до групи
                                    </a>
                                </div>
                            </footer>
                        </article>
                    `;
                })
                .catch(error => {
                    document.getElementById('article-content').innerHTML = `
                        <p>Помилка завантаження статті.</p>
                        <p><a href="index.html" class="btn btn-primary">← Всі новини</a></p>
                    `;
                });
        }

        // Theme toggle
        document.querySelector('.theme-toggle').addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('nord-theme', next);
        });
    </script>
</body>
</html>
