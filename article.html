<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завантаження...</title>
    <meta name="description" content="Стаття на Норд — Новини Норвегії українською">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="index.html" class="logo">
                <span class="logo-icon">🇳🇴</span>
                <span class="logo-text">Норд</span>
            </a>
            <nav class="nav">
                <a href="index.html" class="nav-link">Новини</a>
                <a href="index.html#about" class="nav-link">Про нас</a>
                <a href="https://t.me/+YfELMEQsAD4zNmM0" class="nav-link" target="_blank">Telegram</a>
            </nav>
            <div class="header-actions">
                <button class="theme-toggle" aria-label="Перемкнути тему">
                    <span class="theme-icon sun">☀️</span>
                    <span class="theme-icon moon">🌙</span>
                </button>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="container" style="max-width: 800px;">
            <div id="article-content">
                <div class="loading">Завантаження статті...</div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div style="text-align: center; padding: 2rem 0;">
                <p style="color: #64748b;">© 2026 Норд. Новини Норвегії українською.</p>
            </div>
        </div>
    </footer>

    <script>
        // Theme manager - запускаем сразу
        (function() {
            const saved = localStorage.getItem('nord-theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
        })();

        // Article loader
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('slug');

        if (!slug) {
            document.getElementById('article-content').innerHTML = '<p>Статтю не знайдено. <a href="index.html">← Повернутись</a></p>';
        } else {
            fetch('data/articles.json')
                .then(r => r.json())
                .then(articles => {
                    const article = articles.find(a => a.slug === slug);
                    if (!article) {
                        document.getElementById('article-content').innerHTML = `
                            <p>Статтю не знайдено.</p>
                            <p><a href="index.html" class="btn btn-primary">← Всі новини</a></p>
                        `;
                        return;
                    }

                    document.title = article.title + ' — Норд';
                    
                    // Форматуємо контент - розбиваємо на параграфи
                    const paragraphs = article.content
                        .split(/\n\n+/)
                        .filter(p => p.trim())
                        .map(p => `<p>${p.trim()}</p>`)
                        .join('\n');
                    
                    // Визначаємо час читання
                    const readingTime = Math.max(1, Math.ceil(article.content.split(/\s+/).length / 200));
                    
                    document.getElementById('article-content').innerHTML = `
                        <article class="article-full">
                            <div style="margin-bottom: 1.5rem;">
                                <a href="index.html" style="color: var(--text-secondary, #64748b); text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem;">
                                    <span>←</span> Всі новини
                                </a>
                            </div>
                            
                            <header class="article-header" style="margin-bottom: 2rem;">
                                <h1 style="font-size: 2.25rem; margin-bottom: 1.5rem; line-height: 1.2; font-weight: 700; color: var(--text-primary, #1e293b);">
                                    ${article.title}
                                </h1>
                                
                                <div class="article-meta" style="display: flex; flex-wrap: wrap; gap: 1rem; align-items: center; color: var(--text-secondary, #64748b); font-size: 0.875rem;">
                                    <span style="display: flex; align-items: center; gap: 0.5rem;">
                                        📰 ${article.source_name || 'Норд'}
                                    </span>
                                    <span style="display: flex; align-items: center; gap: 0.5rem;">
                                        📅 ${new Date(article.published_at).toLocaleDateString('uk-UA', { day: 'numeric', month: 'long', year: 'numeric' })}
                                    </span>
                                    <span style="display: flex; align-items: center; gap: 0.5rem;">
                                        ⏱️ ${readingTime} хв читання
                                    </span>
                                </div>
                            </header>
                            
                            <figure class="article-image" style="margin: 0 0 2.5rem 0;">
                                <img src="${article.image}" alt="${article.title}" style="width: 100%; border-radius: 1rem; box-shadow: 0 4px 20px rgba(0,0,0,0.1);">
                            </figure>
                            
                            <div class="article-content" style="
                                font-size: 1.125rem; 
                                line-height: 1.8; 
                                color: var(--text-primary, #334155);
                            ">
                                ${paragraphs}
                            </div>
                            
                            <footer class="article-footer" style="margin-top: 3rem; padding-top: 2rem; border-top: 2px solid var(--border-color, #e2e8f0);">
                                <div style="margin-bottom: 2rem;">
                                    <a href="${article.original_url}" target="_blank" rel="noopener" style="
                                        display: inline-flex;
                                        align-items: center;
                                        gap: 0.5rem;
                                        color: var(--accent, #3b82f6);
                                        text-decoration: none;
                                        font-size: 0.875rem;
                                        padding: 0.75rem 1.25rem;
                                        background: var(--bg-secondary, #f1f5f9);
                                        border-radius: 0.5rem;
                                        transition: all 0.2s;
                                    ">
                                        📎 Джерело: ${article.source_name || 'оригінал'}
                                        <span style="font-size: 1rem;">↗</span>
                                    </a>
                                </div>
                                
                                <div class="telegram-cta" style="
                                    padding: 2rem;
                                    background: linear-gradient(135deg, var(--bg-secondary, #f8fafc) 0%, var(--bg-tertiary, #f1f5f9) 100%);
                                    border-radius: 1rem;
                                    text-align: center;
                                    border: 1px solid var(--border-color, #e2e8f0);
                                ">
                                    <h3 style="margin: 0 0 0.5rem 0; font-size: 1.25rem; color: var(--text-primary, #1e293b);">
                                        📱 Більше новин в Telegram
                                    </h3>
                                    <p style="margin: 0 0 1.25rem 0; color: var(--text-secondary, #64748b); font-size: 0.9rem;">
                                        Приєднуйтесь до спільноти українців у Норвегії
                                    </p>
                                    <a href="https://t.me/+YfELMEQsAD4zNmM0" target="_blank" class="btn btn-primary" style="
                                        display: inline-block;
                                        padding: 0.875rem 2rem;
                                        background: #0088cc;
                                        color: white;
                                        text-decoration: none;
                                        border-radius: 0.5rem;
                                        font-weight: 600;
                                        transition: transform 0.2s, box-shadow 0.2s;
                                    ">
                                        Приєднатись до групи
                                    </a>
                                </div>
                            </footer>
                        </article>
                    `;
                })
                .catch(error => {
                    document.getElementById('article-content').innerHTML = `
                        <p>Помилка завантаження статті.</p>
                        <p><a href="index.html" class="btn btn-primary">← Всі новини</a></p>
                    `;
                });
        }

        // Theme toggle
        document.querySelector('.theme-toggle').addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('nord-theme', next);
        });
    </script>
</body>
</html>
